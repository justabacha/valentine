<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setting Center - Baroness V3</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>

    <div id="settings-page" class="settings-full-view">
        
        <!-- Top Section from Sketch -->
        <header class="settings-top">
            <button class="back-pill">back</button>
            <h1 class="main-title">SETTING CENTER</h1>
        </header>

        <div class="profile-section">
            <div class="profile-circle">P/B</div>
        </div>

        <!-- Global Themes Section -->
        <div class="category-wrapper">
            <div class="category-pill">GLOBAL THEMES</div>
            
            <div class="theme-grid">
                <!-- Theme Card 1 -->
                <div class="theme-item">
                    <div class="theme-card card-natural">
                        <div class="screenshot-hint">Snippet of Theme</div>
                    </div>
                    <div class="label-pill">Natural</div>
                </div>

                <!-- Theme Card 2 -->
                <div class="theme-item">
                    <div class="theme-card card-blueray">
                        <div class="screenshot-hint">Click to Preview</div>
                    </div>
                    <div class="label-pill">Blueray</div>
                </div>

                <!-- Theme Card 3 -->
                <div class="theme-item">
                    <div class="theme-card card-galaxy">
                        <div class="screenshot-hint">Scroll Snippet</div>
                    </div>
                    <div class="label-pill">Galaxy</div>
                </div>
            </div>
        </div>

        <!-- Wishlist Themes Section -->
        <div class="category-wrapper">
            <div class="category-pill">WISHLIST THEMES</div>
            
            <div class="theme-grid">
                <div class="theme-item"><div class="theme-card"></div><div class="label-pill">Soft</div></div>
                <div class="theme-item"><div class="theme-card"></div><div class="label-pill">Baroness</div></div>
                <div class="theme-item"><div class="theme-card"></div><div class="label-pill">Night</div></div>
            </div>
        </div>

    </div>
    <!-- Choice Popup -->
<div id="choice-card" class="choice-overlay hidden">
    <div class="choice-box">
        <h3 style="color: white; font-size: 1.1rem;">Theme Settings</h3>
        <div class="choice-buttons">
            <button id="btn-apply">Apply Theme</button>
            <button id="btn-view">View Preview</button>
        </div>
        <button class="close-choice">Cancel</button>
    </div>
</div>
<!-- Full Screen Preview Gallery -->
<div id="preview-layer" class="preview-overlay hidden">
    <button class="close-preview" id="close-preview-btn">×</button>
    
    <div class="preview-scroller" id="preview-scroller">
        <!-- Assign these classes via JS to rotate -->
        <div class="snippet-slide pos-left">
            <img src="/bucket/Image-14.jpg" alt="Home View">
            <button class="apply-inside-btn">Apply Theme</button>
        </div>
        
        <div class="snippet-slide pos-center">
            <img src="/bucket/Image-51.jpg" alt="Wishlist View">
            <button class="apply-inside-btn">Apply Theme</button>
        </div>
        
        <div class="snippet-slide pos-right">
            <img src="/bucket/Image-16.jpg" alt="Messages View">
            <button class="apply-inside-btn">Apply Theme</button>
        </div>
    </div>
</div>
<script src="settings.js" ></script>
</body>
</html>
