<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis | Coming Soon</title>
    <!--<link rel="stylesheet" href="jarvis.css">-->
</head>
<body>
    <style>
        body {
    margin: 0;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    overflow: hidden;
}

.vibe-container {
    text-align: center;
    animation: fadeIn 0.8s ease-out;
}

.coming-soon-text {
    font-size: clamp(2.5rem, 10vw, 5rem);
    font-weight: 900;
    letter-spacing: -2px;
    background: linear-gradient(to bottom, #c105fa, #a45bf18a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 10px 0;
}

.status-tag {
    font-size: 0.9rem;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.4);
}

.back-btn {
    margin-top: 30px;
    cursor: pointer;
    font-weight: bold;
    opacity: 0.6;
    transition: opacity 0.3s;
}

.back-btn:hover { opacity: 1; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
    </style>
    <div class="vibe-container">
        <div class="brand-icon">
            <img src="https://img.icons8.com/fluency/48/artificial-intelligence.png" alt="J.A.R.V.I.S">
        </div>
        <h1 class="coming-soon-text">J.A.R.V.I.S</h1>
        <p class="status">Just A Rather Very Intelligent System</p>
        <p class="status-tag">unataka nikuambie<nav></nav>COMING SOON😂😂</p>
        <div class="back-btn" onclick="window.history.back()">← BACK</div>
    </div>
</body>
</html>
